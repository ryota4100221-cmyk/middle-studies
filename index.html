<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDDLE STUDIES — monaka design.</title>
<meta name="description" content="Daily 3D studies of the middle. Procedurally built in Blender, by code only.">
<style>
  :root {
    --black: #0a0a0a;
    --lime: #A5E02E;
    --gray: #8a8a8a;
    --line: #1f1f1f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: #f4f4f4;
    font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 12vh 6vw 8vh;
    border-bottom: 1px solid var(--line);
  }
  .kicker {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--lime);
    margin-bottom: 24px;
  }
  h1 {
    font-size: clamp(40px, 8vw, 104px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .sub {
    margin-top: 28px;
    font-size: 14px;
    color: var(--gray);
    max-width: 40em;
    line-height: 1.9;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--line);
    border-bottom: 1px solid var(--line);
  }
  .card {
    background: var(--black);
    padding: 40px 32px 48px;
    display: block;
    color: inherit;
    text-decoration: none;
  }
  .card video, .card img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    background: #111;
  }
  .card .no {
    margin-top: 28px;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--lime);
  }
  .card h2 {
    margin-top: 10px;
    font-size: 24px;
    letter-spacing: 0.02em;
    font-weight: 700;
  }
  .card h2 span {
    font-size: 13px;
    color: var(--gray);
    font-weight: 400;
    margin-left: 10px;
  }
  .card p {
    margin-top: 14px;
    font-size: 12.5px;
    line-height: 1.9;
    color: var(--gray);
  }
  .card .date {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #555;
  }
  footer {
    padding: 10vh 6vw;
    font-size: 12px;
    color: var(--gray);
    line-height: 2;
  }
  footer strong { color: #f4f4f4; }
</style>
</head>
<body>
<header>
  <div class="kicker">MIDDLE STUDIES</div>
  <h1>Designing the Middle<br>of Your Story.</h1>
  <p class="sub">
    「真ん中」を毎日ひとつ、違うかたちで研究する連作。
    白・黒 #0a0a0a・ライム #A5E02E だけを使い、
    Blenderをコードだけで動かして生成しています。モデリングも、光も、ループも、すべてPython。
  </p>
</header>
<main class="grid" id="grid"></main>
<footer>
  <strong>monaka design.</strong><br>
  Procedural 3D studies — built headless in Blender, by code only.<br>
  We wrap your vision in design.
</footer>
<script>
fetch('works.json')
  .then(r => r.json())
  .then(works => {
    const grid = document.getElementById('grid');
    works.slice().reverse().forEach(w => {
      const dir = `works/${w.id}_${w.slug}`;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = `${dir}/hero.png`;
      a.innerHTML = `
        <video src="${dir}/loop.mp4" poster="${dir}/hero.png"
               autoplay loop muted playsinline></video>
        <div class="no">MIDDLE STUDY ${w.id}</div>
        <h2>${w.title}<span>${w.title_ja}</span></h2>
        <p>${w.concept}</p>
        <div class="date">${w.date}</div>`;
      grid.appendChild(a);
    });
  });
</script>
</body>
</html>
